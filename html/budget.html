<section class="page hidden" id="budget" aria-hidden="true">
  <div class="budget-header">
    <h2 class="page-title">Budgets</h2>
    <div class="budget-controls">
      <label>Month: <input id="budget-period" type="month"></label>
      <button id="budget-copy-button" class="btn btn-secondary">Copy from previous month</button>
      <button id="budget-refresh-summary" class="btn btn-secondary">Refresh summary</button>
    </div>
  </div>

  <section class="budget-editor">
    <h3>Category Budgets</h3>
    <table class="budget-editor-table">
      <thead>
        <tr>
          <th>Category</th>
          <th>Expense budget</th>
          <th>Income budget</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="budget-editor-tbody">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <section class="budget-summary-section">
    <h3>Budget vs Actual</h3>
    <div id="budget-summary"></div>
  </section>
</section>
