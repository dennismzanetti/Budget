<section class="page hidden" id="categories" aria-hidden="true">
  <div class="page-header">
    <h2 class="page-title">Categories</h2>
    <button id="addCategoryBtn" class="btn btn-primary" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Category
    </button>
  </div>

  <!-- ── Breakdown section ───────────────────────────────────────── -->
  <div class="cat-breakdown" id="catBreakdown">
    <!-- Collapsible header row: nav controls + toggle button -->
    <div class="cat-breakdown__header">
      <div class="cat-breakdown__controls">
        <button class="cat-breakdown__nav" id="catBreakdownPrev" aria-label="Previous month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="cat-breakdown__period" id="catBreakdownPeriod">Loading…</span>
        <button class="cat-breakdown__nav" id="catBreakdownNext" aria-label="Next month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="cat-breakdown__toggle" id="catBreakdownToggle" aria-expanded="true" aria-controls="catBreakdownCharts" aria-label="Toggle charts">
        <span class="cat-breakdown__toggle-label">Charts</span>
        <svg class="cat-breakdown__toggle-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>

    <!-- Collapsible charts body -->
    <div class="cat-breakdown__charts" id="catBreakdownCharts">
      <!-- Income card -->
      <div class="cat-breakdown__card cat-breakdown__card--income">
        <div class="cat-breakdown__card-title">Income</div>
        <div class="cat-breakdown__donut-wrap">
          <canvas id="catIncomeChart" aria-label="Income by category donut chart"></canvas>
          <div class="cat-breakdown__donut-center">
            <span class="cat-breakdown__donut-total" id="catIncomeTotalLabel">$0</span>
            <span class="cat-breakdown__donut-label">total</span>
          </div>
        </div>
        <ul class="cat-breakdown__rows" id="catIncomeRows"></ul>
      </div>
      <!-- Expense card -->
      <div class="cat-breakdown__card cat-breakdown__card--expense">
        <div class="cat-breakdown__card-title">Expenses</div>
        <div class="cat-breakdown__donut-wrap">
          <canvas id="catExpenseChart" aria-label="Expenses by category donut chart"></canvas>
          <div class="cat-breakdown__donut-center">
            <span class="cat-breakdown__donut-total" id="catExpenseTotalLabel">$0</span>
            <span class="cat-breakdown__donut-label">total</span>
          </div>
        </div>
        <ul class="cat-breakdown__rows" id="catExpenseRows"></ul>
      </div>
    </div>
  </div>

  <!-- ── Add category form ─────────────────────────────────────── -->
  <div id="addCategoryForm" class="card hidden" aria-label="Add new category">
    <h3 class="card-title">New Category</h3>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label" for="newCategoryName">Category name <span aria-hidden="true">*</span></label>
        <input id="newCategoryName" class="form-input" type="text" placeholder="e.g. Groceries" required />
      </div>
      <div class="form-field form-field--color">
        <label class="form-label" for="newCategoryColor">Color</label>
        <input id="newCategoryColor" class="form-input form-input--color" type="color" value="#4f98a3" />
      </div>
      <div class="form-field form-field--emoji">
        <label class="form-label">Emoji</label>
        <!-- Hidden input keeps the value — JS in categories.js reads this -->
        <input id="newCategoryEmoji" type="hidden" value="" />
        <div class="emoji-picker-wrap" id="newEmojiPickerWrap">
          <button type="button" class="emoji-picker-trigger" id="newEmojiPickerBtn" aria-haspopup="true" aria-expanded="false" aria-label="Choose emoji">
            <span class="emoji-picker-trigger__display" id="newEmojiDisplay">😊</span>
            <span class="emoji-picker-trigger__caret">▾</span>
          </button>
          <div class="emoji-picker-popup hidden" id="newEmojiPickerPopup" role="dialog" aria-label="Emoji picker">
            <div class="emoji-picker-popup__tabs" id="newEmojiTabs"></div>
            <div class="emoji-picker-popup__grid" id="newEmojiGrid"></div>
            <button type="button" class="emoji-picker-popup__clear" id="newEmojiClear">Clear</button>
          </div>
        </div>
      </div>
    </div>
    <div id="addCategoryError" class="form-error hidden" role="alert"></div>
    <div class="form-actions">
      <button id="cancelAddCategory" class="btn btn-ghost" type="button">Cancel</button>
      <button id="saveCategoryBtn" class="btn btn-primary" type="button">Save Category</button>
    </div>
  </div>

  <ul id="categoriesList" class="accounts-list" aria-live="polite"></ul>

  <script>
    (function () {
      var btn = document.getElementById('catBreakdownToggle');
      var panel = document.getElementById('catBreakdownCharts');
      if (!btn || !panel) return;
      btn.addEventListener('click', function () {
        var expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!expanded));
        panel.classList.toggle('is-collapsed', expanded);
      });
    })();
  </script>
</section>
