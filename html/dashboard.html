<section class="page" id="dashboard">
  <div class="dash-page-header">
    <h2 class="page-title">Dashboard</h2>
    <div class="dash-month-selector-wrap">
      <label for="dashMonthSelect" class="dash-month-label">Month</label>
      <select id="dashMonthSelect" class="dash-month-select"></select>
    </div>
  </div>

  <!-- KPI Row -->
  <div class="dash-kpi-row">
    <article class="dash-kpi-card">
      <p class="dash-kpi-label">Income This Month</p>
      <p class="dash-kpi-value dash-kpi-value--income" id="dashKpiIncome">—</p>
    </article>
    <article class="dash-kpi-card">
      <p class="dash-kpi-label">Expenses This Month</p>
      <p class="dash-kpi-value dash-kpi-value--expense" id="dashKpiExpenses">—</p>
    </article>
    <article class="dash-kpi-card">
      <p class="dash-kpi-label">Net Cash Flow</p>
      <p class="dash-kpi-value" id="dashKpiNet">—</p>
    </article>
    <article class="dash-kpi-card">
      <p class="dash-kpi-label">Transactions</p>
      <p class="dash-kpi-value" id="dashKpiCount">—</p>
    </article>
  </div>

  <!-- Charts Row: Donut + Trend -->
  <div class="dash-charts-row dash-charts-row--two">
    <div class="dash-chart-wrap">
      <div class="dash-chart-header">
        <h3>Spending by Category</h3>
      </div>
      <div class="dash-donut-container">
        <canvas id="dashCategoryChart"></canvas>
        <div class="dash-donut-center" id="dashDonutCenter"></div>
      </div>
      <div id="dashCategoryLegend" class="dash-category-legend"></div>
    </div>

    <div class="dash-chart-wrap">
      <div class="dash-chart-header">
        <h3>6-Month Trend</h3>
      </div>
      <div class="dash-trend-container">
        <canvas id="dashTrendChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Budget Progress Bars -->
  <div class="dash-budget-progress-wrap">
    <div class="dash-budget-progress-header">
      <h3>Budget Progress</h3>
      <a href="#budgets" class="dash-view-all">Manage budgets</a>
    </div>
    <div id="dashBudgetProgress" class="dash-budget-progress-body">
      <p class="dash-loading">Loading…</p>
    </div>
  </div>

  <!-- Recent Transactions -->
  <div class="dash-recent-wrap">
    <div class="dash-recent-header">
      <h3>Recent Transactions</h3>
      <a href="#transactions" class="dash-view-all">View all</a>
    </div>
    <div class="dash-recent-table-wrap">
      <table class="dash-recent-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Payee</th>
            <th class="dash-hide-mobile">Account</th>
            <th class="dash-hide-mobile">Category</th>
            <th class="dash-amount-col">Amount</th>
          </tr>
        </thead>
        <tbody id="dashRecentTbody">
          <tr><td colspan="5" class="dash-loading">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
