<header class="topbar topbar--centered">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" role="img" aria-label="Budget App logo">
        <rect x="6" y="8" width="36" height="32" rx="10" fill="none" stroke="currentColor" stroke-width="3"></rect>
        <path d="M16 29c2-4 4-6 8-6s6 2 8 6" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
        <path d="M18 18h12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
      </svg>
    </div>
    <div>
      <h1>Budget App</h1>
      <p class="subtle">Household budget tracker</p>
    </div>
  </div>
  <div class="topbar-actions">
    <button id="themeToggle" class="btn btn-ghost" type="button" aria-label="Toggle theme">Theme</button>
  </div>
</header>
<main class="auth-shell">
  <section class="auth-card card">
    <div class="brand-mark brand-mark--lg" aria-hidden="true">
      <svg viewBox="0 0 48 48" role="img" aria-label="Budget App logo">
        <rect x="6" y="8" width="36" height="32" rx="10" fill="none" stroke="currentColor" stroke-width="3"></rect>
        <path d="M16 29c2-4 4-6 8-6s6 2 8 6" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
        <path d="M18 18h12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
      </svg>
    </div>
    <p class="eyebrow">Secure access</p>
    <h2>Your budgeting workspace</h2>
    <p class="subtle">Sign in with your Google account to access your personal budget data.</p>
    <button id="heroLoginBtn" class="btn btn-primary btn--full" type="button">Continue with Google</button>
  </section>
</main>
