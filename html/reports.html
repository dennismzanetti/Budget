<section class="page hidden" id="reports" aria-hidden="true">

  <!-- Page header -->
  <div class="rpt-page-header-bar">
    <h2 class="page-title">Reports</h2>
    <div class="rpt-header-controls">
      <select id="rptPeriodType" class="rpt-select" title="Period type">
        <option value="month">Monthly</option>
        <option value="year">Yearly</option>
      </select>
      <input id="rptMonth" class="rpt-select" type="month" title="Select month" />
      <select id="rptYear" class="rpt-select rpt-hidden" title="Select year"></select>
    </div>
  </div>

  <!-- KPI summary strip -->
  <div class="rpt-kpi-strip" aria-live="polite">
    <div class="rpt-kpi-card rpt-kpi--income">
      <span class="rpt-kpi-label">Income</span>
      <span id="rptKpiIncome" class="rpt-kpi-value">&#8212;</span>
    </div>
    <div class="rpt-kpi-card rpt-kpi--expense">
      <span class="rpt-kpi-label">Expenses</span>
      <span id="rptKpiExpense" class="rpt-kpi-value">&#8212;</span>
    </div>
    <div class="rpt-kpi-card rpt-kpi--net">
      <span class="rpt-kpi-label">Net Cash Flow</span>
      <span id="rptKpiNet" class="rpt-kpi-value">&#8212;</span>
    </div>
    <div class="rpt-kpi-card rpt-kpi--txns">
      <span class="rpt-kpi-label">Transactions</span>
      <span id="rptKpiTxns" class="rpt-kpi-value">&#8212;</span>
    </div>
  </div>

  <!-- Charts row -->
  <div class="rpt-charts-row">

    <!-- Spending by Category (donut) -->
    <div class="card rpt-chart-card">
      <h3 class="rpt-chart-title">Spending by Category</h3>
      <div class="rpt-chart-wrap">
        <canvas id="rptCategoryChart" aria-label="Spending by category chart"></canvas>
      </div>
      <div id="rptCategoryLegend" class="rpt-legend"></div>
    </div>

    <!-- Income vs Expenses (bar) -->
    <div class="card rpt-chart-card">
      <h3 class="rpt-chart-title">Income vs Expenses</h3>
      <div class="rpt-chart-wrap">
        <canvas id="rptIncomeExpenseChart" aria-label="Income vs expenses chart"></canvas>
      </div>
    </div>

  </div>

  <!-- Budget vs Actual table -->
  <div class="card rpt-table-card">
    <h3 class="rpt-chart-title">Budget vs Actual</h3>
    <div class="rpt-bva-wrap">
      <table class="rpt-bva-table" aria-label="Budget vs actual">
        <thead>
          <tr>
            <th scope="col">Category</th>
            <th scope="col" class="rpt-num-col">Budget</th>
            <th scope="col" class="rpt-num-col">Actual</th>
            <th scope="col" class="rpt-num-col">Remaining</th>
            <th scope="col" class="rpt-progress-col">Progress</th>
          </tr>
        </thead>
        <tbody id="rptBvaBody" aria-live="polite">
          <tr><td colspan="5" class="rpt-loading">Loading&#8230;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Top spending table -->
  <div class="card rpt-table-card">
    <h3 class="rpt-chart-title">Top Transactions</h3>
    <div class="rpt-bva-wrap">
      <table class="rpt-bva-table" aria-label="Top transactions">
        <thead>
          <tr>
            <th scope="col">Date</th>
            <th scope="col">Description</th>
            <th scope="col" class="rpt-hide-mobile">Category</th>
            <th scope="col" class="rpt-num-col">Amount</th>
          </tr>
        </thead>
        <tbody id="rptTopTxnBody" aria-live="polite">
          <tr><td colspan="4" class="rpt-loading">Loading&#8230;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</section>
