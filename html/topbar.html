<header class="app-topbar">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" role="img" aria-label="Budget App logo">
        <rect x="6" y="8" width="36" height="32" rx="10" fill="none" stroke="currentColor" stroke-width="3"></rect>
        <path d="M16 29c2-4 4-6 8-6s6 2 8 6" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
        <path d="M18 18h12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
      </svg>
    </div>
    <span class="brand-name">Budget</span>
  </div>
  <div class="topbar-actions">
    <a href="#help" class="btn btn-ghost btn--icon" data-page="help" aria-label="Help">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </a>
    <button id="themeToggle2" class="btn btn-ghost btn--icon" type="button" aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <img id="userPhoto" class="avatar avatar--sm" src="https://placehold.co/36x36" alt="User profile" width="36" height="36" />
    <button id="logoutBtn" class="btn btn-ghost" type="button">Sign out</button>
  </div>
</header>
