<section class="page hidden" id="transactions" aria-hidden="true">

  <!-- Page header -->
  <div class="txn-page-header-bar">
    <h2 class="page-title">Transactions</h2>
    <div style="margin-left:auto;display:flex;gap:0.5rem;">
      <button id="addTransactionBtn" class="btn btn-primary btn-sm" type="button"
              style="display:flex;align-items:center;gap:0.35rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Transaction
      </button>
      <button id="massUpdateBtn" class="btn btn-secondary btn-sm" type="button"
              style="display:flex;align-items:center;gap:0.35rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        Mass Update
      </button>
    </div>
  </div>

  <!-- Summary stat cards (above filters) -->
  <div class="txn-summary-section" aria-live="polite">
    <div class="txn-stat-card">
      <span class="txn-stat-icon">&#35;</span>
      <div class="txn-stat-body">
        <span id="txnSummaryCount" class="txn-stat-value">&#8212;</span>
        <span class="txn-stat-label">Transactions</span>
      </div>
    </div>
    <div class="txn-stat-card txn-stat-card--income">
      <span class="txn-stat-icon">&#8593;</span>
      <div class="txn-stat-body">
        <span id="txnSummaryIncome" class="txn-stat-value txn-stat-value--income">&#8212;</span>
        <span class="txn-stat-label">Income</span>
      </div>
    </div>
    <div class="txn-stat-card txn-stat-card--expense">
      <span class="txn-stat-icon">&#8595;</span>
      <div class="txn-stat-body">
        <span id="txnSummaryExpense" class="txn-stat-value txn-stat-value--expense">&#8212;</span>
        <span class="txn-stat-label">Expenses</span>
      </div>
    </div>
    <div class="txn-stat-card txn-stat-card--net">
      <span class="txn-stat-icon">=</span>
      <div class="txn-stat-body">
        <span id="txnSummaryNet" class="txn-stat-value txn-stat-value--net">&#8212;</span>
        <span class="txn-stat-label">Net</span>
      </div>
    </div>
  </div>

  <!-- Filter strip -->
  <div class="txn-filter-bar" aria-label="Transaction filters">
    <select id="txnFilterAccount" class="txn-filter-input" title="Account">
      <option value="">All Accounts</option>
    </select>
    <select id="txnFilterCategory" class="txn-filter-input" title="Category">
      <option value="">All Categories</option>
    </select>
    <select id="txnFilterType" class="txn-filter-input" title="Type">
      <option value="">All Types</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <input id="txnFilterDateFrom" class="txn-filter-input" type="date" title="From date" />
    <input id="txnFilterDateTo" class="txn-filter-input" type="date" title="To date" />
    <input id="txnSearch" class="txn-filter-input txn-filter-search" type="search" placeholder="Search&#8230;" />
    <button id="txnClearFilters" class="txn-clear-btn hidden" type="button" title="Clear filters">&#10005; Clear</button>
  </div>

  <!-- Scrollable table region -->
  <div class="txn-table-region">
    <div class="txn-table-wrapper">
      <table class="txn-table" aria-label="Transactions">
        <thead>
          <tr>
            <th class="txn-th txn-th--sortable txn-col-date" data-col="date" scope="col" aria-sort="descending">
              Date <span class="txn-sort-icon" aria-hidden="true">&#8595;</span>
            </th>
            <th class="txn-th txn-th--sortable txn-col-desc" data-col="payee" scope="col" aria-sort="none">
              Description <span class="txn-sort-icon" aria-hidden="true">&#8597;</span>
            </th>
            <th class="txn-th txn-th--sortable txn-col-account txn-hide-mobile" data-col="account" scope="col" aria-sort="none">
              Account <span class="txn-sort-icon" aria-hidden="true">&#8597;</span>
            </th>
            <th class="txn-th txn-th--sortable txn-col-category" data-col="category" scope="col" aria-sort="none">
              Category <span class="txn-sort-icon" aria-hidden="true">&#8597;</span>
            </th>
            <th class="txn-th txn-th--sortable txn-col-type txn-hide-mobile" data-col="type" scope="col" aria-sort="none">
              Type <span class="txn-sort-icon" aria-hidden="true">&#8597;</span>
            </th>
            <th class="txn-th txn-th--sortable txn-col-amount" data-col="amount" scope="col" aria-sort="none">
              Amount <span class="txn-sort-icon" aria-hidden="true">&#8597;</span>
            </th>
            <th class="txn-th txn-col-actions" scope="col"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody id="txnTableBody">
          <tr><td colspan="7" class="txn-loading">Loading&#8230;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Add Transaction Modal ─────────────────────────────────────── -->
  <div id="addTransactionModal" class="modal-backdrop" style="display:none;" role="dialog"
       aria-modal="true" aria-labelledby="addTxnModalTitle">
    <div class="modal-box" style="max-width:480px;width:100%;">
      <div class="modal-header">
        <h3 id="addTxnModalTitle" class="modal-title">Add Transaction</h3>
        <button id="addTxnClose" class="modal-close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="addTxnForm" novalidate autocomplete="off">

          <div class="form-group">
            <label for="addTxnDate" class="form-label">Date <span aria-hidden="true">*</span></label>
            <input id="addTxnDate" type="date" class="form-input" required />
          </div>

          <div class="form-group">
            <label for="addTxnPayee" class="form-label">Description / Payee <span aria-hidden="true">*</span></label>
            <input id="addTxnPayee" type="text" class="form-input" placeholder="e.g. Grocery Store" required />
          </div>

          <div class="form-group">
            <label for="addTxnAccount" class="form-label">Account <span aria-hidden="true">*</span></label>
            <select id="addTxnAccount" class="form-input" required>
              <option value="">&#8212; select account &#8212;</option>
            </select>
          </div>

          <div class="form-group">
            <label for="addTxnCategory" class="form-label">Category</label>
            <select id="addTxnCategory" class="form-input">
              <option value="">&#8212; none &#8212;</option>
            </select>
          </div>

          <div class="form-group">
            <label for="addTxnType" class="form-label">Type <span aria-hidden="true">*</span></label>
            <select id="addTxnType" class="form-input" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>

          <div class="form-group">
            <label for="addTxnAmount" class="form-label">Amount ($) <span aria-hidden="true">*</span></label>
            <input id="addTxnAmount" type="number" class="form-input" placeholder="0.00"
                   min="0.01" step="0.01" required />
          </div>

          <div class="form-group">
            <label for="addTxnNotes" class="form-label">Notes</label>
            <input id="addTxnNotes" type="text" class="form-input" placeholder="Optional notes" />
          </div>

          <div id="addTxnError" style="display:none;color:var(--color-error,#a12c7b);
               background:var(--color-error-highlight,#e0ced7);border-radius:var(--radius-md,6px);
               padding:0.5rem 0.75rem;margin-bottom:0.75rem;font-size:0.875rem;">
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button id="addTxnCancel" class="btn btn-secondary">Cancel</button>
        <button id="addTxnSave" class="btn btn-primary">Save Transaction</button>
      </div>
    </div>
  </div>

  <!-- ── Mass Update Modal ─────────────────────────────────────────── -->
  <div id="massUpdateModal" class="modal-backdrop" style="display:none;" role="dialog"
       aria-modal="true" aria-labelledby="massUpdateModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="massUpdateModalTitle" class="modal-title">Mass Category Update</h3>
        <button id="massUpdateClose" class="modal-close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Criteria panel -->
        <div id="massUpdateCriteriaPanel">
          <p style="margin-bottom:1rem;color:var(--color-text-muted,#7a7974);font-size:0.875rem;">Match transactions by any combination of criteria, then bulk-assign a category.</p>
          <div class="form-group">
            <label class="form-label" for="muDesc">Description contains</label>
            <input id="muDesc" type="text" class="form-input" placeholder="e.g. Amazon" />
          </div>
          <div class="form-group">
            <label class="form-label" for="muCurrentCat">Current category</label>
            <select id="muCurrentCat" class="form-input"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="muAccount">Account</label>
            <select id="muAccount" class="form-input"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="muType">Type</label>
            <select id="muType" class="form-input">
              <option value="">Any type</option>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div class="form-group">
              <label class="form-label" for="muDateFrom">From date</label>
              <input id="muDateFrom" type="date" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label" for="muDateTo">To date</label>
              <input id="muDateTo" type="date" class="form-input" />
            </div>
          </div>
          <hr style="margin:1rem 0;border:none;border-top:1px solid var(--color-divider,#dcd9d5);" />
          <div class="form-group">
            <label class="form-label" for="muTargetCat">Assign category <span aria-hidden="true">*</span></label>
            <select id="muTargetCat" class="form-input"></select>
          </div>
        </div>

        <!-- Preview panel (shown after clicking Preview) -->
        <div id="massUpdatePreviewPanel" style="display:none;">
          <p id="massUpdatePreviewSummary" style="margin-bottom:0.75rem;font-weight:600;"></p>
          <div id="massUpdatePreviewList"
               style="max-height:320px;overflow-y:auto;border:1px solid var(--color-border,#d4d1ca);
                      border-radius:var(--radius-md,6px);font-size:0.8rem;">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="massUpdateCancel" class="btn btn-secondary">Cancel</button>
        <button id="massUpdateBack" class="btn btn-secondary" style="display:none;">&#8592; Back</button>
        <button id="massUpdatePreview" class="btn btn-primary">Preview matches</button>
        <button id="massUpdateApply" class="btn btn-primary" style="display:none;">Apply</button>
      </div>
    </div>
  </div>

</section>
