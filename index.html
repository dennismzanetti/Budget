<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget App</title>
  <meta name="description" content="Household budget app with Firebase Google login." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- LOGGED OUT VIEW — populated by html/login.html -->
  <div id="loggedOutView"></div>

  <!-- LOGGED IN VIEW -->
  <div id="loggedInView" class="hidden app-layout">

    <!-- TOPBAR — populated by html/topbar.html -->
    <div id="topbarContainer"></div>

    <!-- SIDEBAR + CONTENT -->
    <div class="app-body">

      <!-- SIDEBAR (desktop) — populated by html/sidebar.html -->
      <div id="sidebarContainer"></div>

      <!-- MAIN CONTENT — pages injected by partials.js -->
      <main id="main" class="app-content">
        <section class="page" id="dashboard"></section>
        <section class="page hidden" id="budget" aria-hidden="true"></section>
        <section class="page hidden" id="transactions" aria-hidden="true"></section>
        <section class="page hidden" id="accounts" aria-hidden="true"></section>
        <section class="page hidden" id="categories" aria-hidden="true"></section>
        <section class="page hidden" id="reports" aria-hidden="true"></section>
        <section class="page hidden" id="import" aria-hidden="true"></section>
        <section class="page hidden" id="settings" aria-hidden="true"></section>
        <section class="page hidden" id="help" aria-hidden="true"></section>
      </main>
    </div>

    <!-- BOTTOM TAB BAR (mobile) — populated by html/bottom-tabs.html -->
    <div id="bottomTabsContainer"></div>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
